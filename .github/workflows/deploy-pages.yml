name: Deploy HotD companion to GitHub Pages

# Builds the standalone static version of the House of the Dragon companion
# (pages-site/, which reuses the /hotd source from src/) and publishes it to
# GitHub Pages.
#
# One-time setup required in the repo: Settings → Pages → Build and deployment
# → Source: "GitHub Actions". After that, every push to main that touches the
# dashboard redeploys automatically. You can also run it manually below.

on:
  push:
    branches: [main]
    paths:
      - "pages-site/**"
      - "src/components/hotd/**"
      - "src/lib/hotd/**"
      - "src/lib/utils.ts"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

# Permissions needed for the Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: pages-site
        run: npm ci

      - name: Build static site
        working-directory: pages-site
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
